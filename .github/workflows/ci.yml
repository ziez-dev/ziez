name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-native:
    name: Test on ${{ matrix.os }} ${{ matrix.distro }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            distro: ubuntu-latest
            runner: ubuntu-latest
          - os: macos
            distro: x64
            runner: macos-latest
          - os: macos
            distro: arm64
            runner: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.zig
            ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc-dev

      - name: Run native tests
        run: zig build test --summary all

      - name: Build examples
        run: zig build

  test-linux-containers:
    name: Test on linux ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            container: debian:latest
          - distro: fedora
            container: fedora:latest
          - distro: arch
            container: archlinux/archlinux:latest
          - distro: alpine
            container: alpine:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.zig
            ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install dependencies (Debian)
        if: matrix.distro == 'debian'
        run: |
          apt-get update
          apt-get install -y libc-dev xz-utils

      - name: Install dependencies (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          dnf install -y glibc-devel gcc

      - name: Install dependencies (Arch)
        if: matrix.distro == 'arch'
        run: |
          pacman -Sy --noconfirm glibc base-devel gcc

      - name: Install dependencies (Alpine)
        if: matrix.distro == 'alpine'
        run: |
          apk add --no-cache musl-dev build-base gcc

      - name: Run native tests
        run: zig build test --summary all

      - name: Build examples
        run: zig build

  cross-compile:
    name: Cross-compile to ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos-none
          - aarch64-macos-none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.zig
            ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cross-compile build
        run: zig build -Dtarget=${{ matrix.target }}
