name: Bump Plugin Dependencies

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump:
    name: Update ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - cors
          - compression
          - security
          - static
          - template
          - tls
          - tracker
          - ua-parser
          - plugin-example

    steps:
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/${{ matrix.plugin }}
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Compute new hash
        id: hash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract version without 'v' prefix
          VERSION="${TAG#v}"
          TAR_URL="https://github.com/ziez-dev/ziez/archive/refs/tags/${TAG}.tar.gz"
          NEW_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${TAR_URL}")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "hash=${NEW_HASH}" >> "$GITHUB_OUTPUT"
          echo "url=${TAR_URL}" >> "$GITHUB_OUTPUT"

      - name: Update build.zig.zon
        run: |
          TAG="${{ steps.hash.outputs.tag }}"
          NEW_HASH="${{ steps.hash.outputs.hash }}"
          TAR_URL="${{ steps.hash.outputs.url }}"

          OLD_URL=$(grep -oP 'https://github\.com/ziez-dev/ziez/archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz' build.zig.zon | head -1)
          OLD_HASH=$(grep -A1 "${OLD_URL}" build.zig.zon | grep -oP 'ziez-[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z0-9_-]+' | head -1)

          if [ -z "$OLD_URL" ]; then
            echo "No ziez dependency found in build.zig.zon"
            exit 1
          fi

          sed -i "s|${OLD_URL}|${TAR_URL}|g" build.zig.zon
          sed -i "s|${OLD_HASH}|${NEW_HASH}|g" build.zig.zon

          echo "Updated ziez dep:"
          echo "  URL:  ${TAR_URL}"
          echo "  Hash: ${NEW_HASH}"

      - name: Update README Quick Start
        run: |
          # Remove threaded/io boilerplate from README code blocks
          sed -i '/var threaded = std\.Io\.Threaded\.init/d' README.md
          sed -i '/const io = threaded\.io()/d' README.md
          sed -i '/^$/N;/^\n$/d' README.md

          # Update app.listen(io, ...) -> app.listen(...)
          sed -i 's/app\.listen(io,/app.listen(/g' README.md

          echo "Updated README code blocks"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ZIEZ_BOT_PAT }}
          branch: bot/bump-ziez-${{ steps.hash.outputs.tag }}
          title: 'chore: bump ziez to ${{ steps.hash.outputs.tag }}'
          body: |
            Automated bump to [ziez@${{ steps.hash.outputs.tag }}](https://github.com/ziez-dev/ziez/releases/tag/${{ steps.hash.outputs.tag }}).

            - Updated `build.zig.zon` dependency hash
            - Updated README code examples

            Generated by [ziez bump-plugins workflow](https://github.com/ziez-dev/ziez/actions/workflows/bump-plugins.yml)
          commit-message: |
            chore: bump ziez to ${{ steps.hash.outputs.tag }}

            Update build.zig.zon hash and README code examples.
          delete-branch: true
          labels: dependencies
