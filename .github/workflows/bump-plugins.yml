name: Bump Plugin Dependencies

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-simple-plugins:
    name: Update ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - cors
          - compression
          - security
          - static
          - template
          - tls
          - plugin-example
    steps:
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/${{ matrix.plugin }}
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Compute new ziez hash
        id: hash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TAR_URL="https://github.com/ziez-dev/ziez/archive/refs/tags/${TAG}.tar.gz"
          NEW_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${TAR_URL}")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "hash=${NEW_HASH}" >> "$GITHUB_OUTPUT"
          echo "url=${TAR_URL}" >> "$GITHUB_OUTPUT"

      - name: Update build.zig.zon
        run: |
          NEW_HASH="${{ steps.hash.outputs.hash }}"
          TAR_URL="${{ steps.hash.outputs.url }}"

          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${TAR_URL}|g" build.zig.zon
          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/heads/main\.tar\.gz|${TAR_URL}|g" build.zig.zon
          sed -i "s|ziez-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${NEW_HASH}|g" build.zig.zon

          cat build.zig.zon

      - name: Update README Quick Start
        run: |
          sed -i '/var threaded = std\.Io\.Threaded\.init/d' README.md
          sed -i '/const io = threaded\.io()/d' README.md
          sed -i 's/app\.listen(io,/app.listen(/g' README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ZIEZ_BOT_PAT }}
          branch: bot/bump-ziez-${{ steps.hash.outputs.tag }}
          title: 'chore: bump ziez to ${{ steps.hash.outputs.tag }}'
          body: |
            Automated bump to [ziez@${{ steps.hash.outputs.tag }}](https://github.com/ziez-dev/ziez/releases/tag/${{ steps.hash.outputs.tag }}).

            - Updated `build.zig.zon` dependency hash
            - Updated README code examples

            Generated by [ziez bump-plugins workflow](https://github.com/ziez-dev/ziez/actions/workflows/bump-plugins.yml)
          commit-message: |
            chore: bump ziez to ${{ steps.hash.outputs.tag }}

            Update build.zig.zon hash and README code examples.
          delete-branch: true

  bump-ua-parser:
    name: Update ua-parser
    needs: bump-simple-plugins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ua-parser
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/ua-parser
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Update README Quick Start
        run: |
          sed -i '/var threaded = std\.Io\.Threaded\.init/d' README.md
          sed -i '/const io = threaded\.io()/d' README.md
          sed -i 's/app\.listen(io,/app.listen(/g' README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ZIEZ_BOT_PAT }}
          branch: bot/bump-readme-${{ github.ref_name }}
          title: 'chore: update README code examples'
          body: |
            Update README code examples to match simplified `app.listen()` API.

            Generated by [ziez bump-plugins workflow](https://github.com/ziez-dev/ziez/actions/workflows/bump-plugins.yml)
          commit-message: |
            chore: update README code examples
          delete-branch: true

  bump-tracker:
    name: Update tracker
    needs: bump-ua-parser
    runs-on: ubuntu-latest
    steps:
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Checkout tracker
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/tracker
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Compute new ziez hash
        id: hash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TAR_URL="https://github.com/ziez-dev/ziez/archive/refs/tags/${TAG}.tar.gz"
          NEW_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${TAR_URL}")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "hash=${NEW_HASH}" >> "$GITHUB_OUTPUT"
          echo "url=${TAR_URL}" >> "$GITHUB_OUTPUT"

      - name: Update ziez dep in build.zig.zon
        run: |
          NEW_HASH="${{ steps.hash.outputs.hash }}"
          TAR_URL="${{ steps.hash.outputs.url }}"
          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${TAR_URL}|g" build.zig.zon
          sed -i "s|ziez-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${NEW_HASH}|g" build.zig.zon
          cat build.zig.zon

      - name: Get latest ua-parser hash
        run: |
          UA_TAR="https://github.com/ziez-dev/ua-parser/archive/refs/heads/main.tar.gz"
          UA_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${UA_TAR}")
          sed -i "s|https://github.com/ziez-dev/ua-parser/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${UA_TAR}|g" build.zig.zon
          sed -i "s|ziez_ua_parser-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${UA_HASH}|g" build.zig.zon
          cat build.zig.zon

      - name: Update README Quick Start
        run: |
          sed -i '/var threaded = std\.Io\.Threaded\.init/d' README.md
          sed -i '/const io = threaded\.io()/d' README.md
          sed -i 's/app\.listen(io,/app.listen(/g' README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ZIEZ_BOT_PAT }}
          branch: bot/bump-deps-${{ steps.hash.outputs.tag }}
          title: 'chore: bump ziez to ${{ steps.hash.outputs.tag }} and update ua-parser'
          body: |
            - Bumped ziez to ${{ steps.hash.outputs.tag }}
            - Updated ua-parser dependency to latest main
            - Updated README code examples

            Generated by [ziez bump-plugins workflow](https://github.com/ziez-dev/ziez/actions/workflows/bump-plugins.yml)
          commit-message: |
            chore: bump ziez to ${{ steps.hash.outputs.tag }} and update ua-parser
          delete-branch: true

