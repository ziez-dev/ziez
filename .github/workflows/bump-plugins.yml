name: Bump Plugin Dependencies

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-simple-plugins:
    name: Update ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - cors
          - compression
          - security
          - static
          - template
          - tls
          - plugin-example
    steps:
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/${{ matrix.plugin }}
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Compute new ziez hash
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TAR_URL="https://github.com/ziez-dev/ziez/archive/refs/tags/${TAG}.tar.gz"
          NEW_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${TAR_URL}")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "hash=${NEW_HASH}" >> "$GITHUB_OUTPUT"
          echo "url=${TAR_URL}" >> "$GITHUB_OUTPUT"

      - name: Update build.zig.zon
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          NEW_HASH="${{ steps.vars.outputs.hash }}"
          TAR_URL="${{ steps.vars.outputs.url }}"

          # Bump plugin version
          sed -i "s|\.version = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"|\.version = \"${VERSION}\"|g" build.zig.zon

          # Update ziez dependency URL and hash
          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${TAR_URL}|g" build.zig.zon
          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/heads/main\.tar\.gz|${TAR_URL}|g" build.zig.zon
          sed -i "s|ziez-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${NEW_HASH}|g" build.zig.zon

          echo "--- build.zig.zon ---"
          cat build.zig.zon

      - name: Commit, push, and tag
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          git config user.name "ziez-bot"
          git config user.email "bot@ziez.dev"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump ziez to ${TAG}"
          git push
          git tag "${TAG}"
          git push origin "${TAG}"

  bump-ua-parser:
    name: Update ua-parser
    needs: bump-simple-plugins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ua-parser
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/ua-parser
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Update build.zig.zon version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          sed -i "s|\.version = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"|\.version = \"${VERSION}\"|g" build.zig.zon
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "--- build.zig.zon ---"
          cat build.zig.zon

      - name: Commit, push, and tag
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          git config user.name "ziez-bot"
          git config user.email "bot@ziez.dev"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${TAG}"
          git push
          git tag "${TAG}"
          git push origin "${TAG}"

  bump-tracker:
    name: Update tracker
    needs: bump-ua-parser
    runs-on: ubuntu-latest
    steps:
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Checkout tracker
        uses: actions/checkout@v4
        with:
          repository: ziez-dev/tracker
          token: ${{ secrets.ZIEZ_BOT_PAT }}

      - name: Compute hashes
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TAR_URL="https://github.com/ziez-dev/ziez/archive/refs/tags/${TAG}.tar.gz"
          ZIEZ_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${TAR_URL}")

          UA_TAR="https://github.com/ziez-dev/ua-parser/archive/refs/tags/${TAG}.tar.gz"
          UA_HASH=$(zig fetch --global-cache-dir /tmp/zig-cache "${UA_TAR}")

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ziez_hash=${ZIEZ_HASH}" >> "$GITHUB_OUTPUT"
          echo "ziez_url=${TAR_URL}" >> "$GITHUB_OUTPUT"
          echo "ua_hash=${UA_HASH}" >> "$GITHUB_OUTPUT"
          echo "ua_tar=${UA_TAR}" >> "$GITHUB_OUTPUT"

      - name: Update build.zig.zon
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          ZIEZ_HASH="${{ steps.vars.outputs.ziez_hash }}"
          ZIEZ_URL="${{ steps.vars.outputs.ziez_url }}"
          UA_HASH="${{ steps.vars.outputs.ua_hash }}"
          UA_TAR="${{ steps.vars.outputs.ua_tar }}"

          # Bump plugin version
          sed -i "s|\.version = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"|\.version = \"${VERSION}\"|g" build.zig.zon

          # Update ziez dep
          sed -i "s|https://github.com/ziez-dev/ziez/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${ZIEZ_URL}|g" build.zig.zon
          sed -i "s|ziez-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${ZIEZ_HASH}|g" build.zig.zon

          # Update ua-parser dep
          sed -i "s|https://github.com/ziez-dev/ua-parser/archive/refs/tags/v[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|${UA_TAR}|g" build.zig.zon
          sed -i "s|ziez_ua_parser-[0-9]\+\.[0-9]\+\.[0-9]\+-[a-zA-Z0-9_-]\+|${UA_HASH}|g" build.zig.zon

          echo "--- build.zig.zon ---"
          cat build.zig.zon

      - name: Commit, push, and tag
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          git config user.name "ziez-bot"
          git config user.email "bot@ziez.dev"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump ziez to ${TAG} and update ua-parser"
          git push
          git tag "${TAG}"
          git push origin "${TAG}"
