name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-ubuntu:
    name: Test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libc-dev

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-macos-x64:
    name: Test (macos-x64)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-macos-arm64:
    name: Test (macos-arm64)
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-windows-x64:
    name: Test (windows-x64)
    runs-on: windows-latest
    env:
      ZIG_GLOBAL_CACHE: ${{ github.workspace }}/.zig-global-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            .zig-global-cache
            zig-cache
          key: windows-x64-zig-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            windows-x64-zig-

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-freebsd-x64:
    name: Test (freebsd-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          prepare: |
            export IGNORE_OSVERSION=yes
            pkg update
            pkg upgrade -y
            pkg install -y git cmake ninja llvm18 zstd libxml2 ca_root_nss lang/zig
          run: |
            git config --global http.sslCAInfo /usr/local/share/certs/ca-root-nss.crt
            zig build test --summary all
            zig build

  test-fedora:
    name: Test (fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: dnf install -y glibc-devel gcc

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-arch:
    name: Test (arch)
    runs-on: ubuntu-latest
    container: archlinux/archlinux:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: pacman -Sy --noconfirm glibc base-devel gcc

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-alpine:
    name: Test (alpine)
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Bootstrap
        run: apk add --no-cache git tar xz musl-dev build-base gcc

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-amazonlinux:
    name: Test (amazonlinux)
    runs-on: ubuntu-latest
    container: amazonlinux:2023
    steps:
      - name: Bootstrap
        run: dnf install -y git tar xz

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: dnf install -y glibc-devel gcc

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  cross-compile-linux-x64:
    name: Cross-compile (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Dtarget=x86_64-linux-gnu

  cross-compile-linux-arm64:
    name: Cross-compile (linux-arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cross-compile
        run: zig build -Dtarget=aarch64-linux-gnu

  cross-compile-macos-x64:
    name: Cross-compile (macos-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Dtarget=x86_64-macos-none

  cross-compile-macos-arm64:
    name: Cross-compile (macos-arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Dtarget=aarch64-macos-none

  cross-compile-windows-x64:
    name: Cross-compile (windows-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Dtarget=x86_64-windows-gnu

  cross-compile-freebsd-x64:
    name: Cross-compile (freebsd-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cross-compile
        run: zig build -Dtarget=x86_64-freebsd
