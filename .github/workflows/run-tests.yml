name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-linux:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: ubuntu-latest
            setup: sudo apt-get update && sudo apt-get install -y libc-dev
          - name: ubuntu-arm64
            runner: ubuntu-24.04-arm
            setup: sudo apt-get update && sudo apt-get install -y libc-dev
          - name: fedora
            runner: ubuntu-latest
            container: fedora:latest
            setup: dnf install -y glibc-devel gcc
          - name: arch
            runner: ubuntu-latest
            container: archlinux/archlinux:latest
            setup: pacman -Sy --noconfirm glibc base-devel gcc
          - name: alpine
            runner: ubuntu-latest
            container: alpine:latest
            bootstrap: apk add --no-cache git tar xz musl-dev build-base gcc
            setup: ""
          - name: amazonlinux
            runner: ubuntu-latest
            container: amazonlinux:2023
            bootstrap: dnf install -y git tar xz
            setup: dnf install -y glibc-devel gcc

    steps:
      - name: Bootstrap
        if: matrix.bootstrap != ''
        run: ${{ matrix.bootstrap }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-freebsd:
    name: Test (freebsd-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          prepare: |
            export IGNORE_OSVERSION=yes
            pkg update
            pkg upgrade -y
            pkg install -y git cmake ninja llvm18 zstd libxml2 ca_root_nss lang/zig
          run: |
            git config --global http.sslCAInfo /usr/local/share/certs/ca-root-nss.crt
            zig build test --summary all
            zig build

  test-windows:
    name: Test (windows-x64)
    runs-on: windows-latest
    env:
      ZIG_GLOBAL_CACHE: ${{ github.workspace }}/.zig-global-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            .zig-global-cache
            zig-cache
          key: windows-x64-zig-${{ hashFiles('build.zig.zon', 'build.zig') }}
          restore-keys: |
            windows-x64-zig-

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  test-macos:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-x64
            runner: macos-latest
          - name: macos-arm64
            runner: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test --summary all

      - name: Build
        run: zig build

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
          - target: aarch64-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - target: x86_64-macos-none
          - target: aarch64-macos-none
          - target: x86_64-windows-gnu
          - target: x86_64-freebsd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Cross-compile
        run: zig build -Dtarget=${{ matrix.target }}
